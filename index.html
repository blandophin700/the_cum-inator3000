<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - O Clarim Diário</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Imagem de fundo aplicada globalmente */
            background-image: url('sua-imagem-de-fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Playfair Display', Georgia, serif;
            margin: 0;
            padding: 20px;
        }
        header {
            /* Fundo branco desbotado estilo jornal antigo */
            background-color: #f5f2eb; 
            /* Cor do texto alterada para preto */
            color: #000000;
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            padding: 24px;
            border-radius: 8px;
            /* Brilho verde-lima removido e substituído por uma sombra sutil */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        main {
            /* Fundo do conteúdo também em branco desbotado para combinar */
            background-color: #fcfaf2;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        article {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }
        .article-author {
            font-weight: bold;
            color: #333;
            font-style: italic;
        }
        button {
            cursor: pointer;
            margin-right: 5px;
            padding: 6px 12px;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 4px;
            font-family: inherit;
        }
        button:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Título do Seu Blog</h1>
        <p>Subtítulo ou descrição do seu blog aqui</p>
    </header>

    <main>
        <!-- Template de Artigo (Copie e cole este bloco para criar novos posts) -->
        <article>
            <img src="caminho-da-imagem.jpg" alt="Descrição da imagem">
            <div>
                <h2>Título da Notícia</h2>
                <p class="article-author">Por: Nome do Autor</p>
                <p>O texto do seu artigo ou notícia deve ser inserido neste espaço.</p>
                <button>❤️ <span>0</span></button>
                <button>👍 <span>0</span></button>
            </div>
        </article>
    </main>

    <script>
        const buttons = document.querySelectorAll("button");

        buttons.forEach(function (button) {
            button.addEventListener("click", function handleButtonClick() {
                let currentCounter = button.querySelector("span");
                let countValue = parseInt(currentCounter.textContent);
                currentCounter.textContent = countValue + 1;
            });
        });
    </script>
</body>
</html>
